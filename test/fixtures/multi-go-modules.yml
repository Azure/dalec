dependencies:
  build:
    golang:

build:
  steps:
    - command: |
        set -ex
        cd src
        go run ./main.go >> ./logfile 2>&1

artifacts:
  binaries:
    src/logfile: {}

tests:
  - name: package files
    files:
      /usr/bin/logfile:
        contains:
        - Hello from alternative module
